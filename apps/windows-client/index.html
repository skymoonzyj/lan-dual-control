<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>局域网双端远控 - Windows 控制端</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="设备与连接">
        <header class="brand">
          <div class="brand-mark" aria-hidden="true">L</div>
          <div>
            <h1>局域网远控</h1>
            <p>Windows 控制端</p>
          </div>
        </header>

        <section class="panel connection-panel" aria-labelledby="connection-title">
          <div class="panel-heading">
            <h2 id="connection-title">连接</h2>
            <span id="connectionBadge" class="status-badge offline">未连接</span>
          </div>

          <label class="field">
            <span>连接方式</span>
            <select id="transportSelect">
              <option value="local" selected>本地模拟</option>
              <option value="websocket">WebSocket 局域网</option>
            </select>
          </label>

          <label class="field">
            <span>目标地址</span>
            <input id="hostInput" type="text" value="127.0.0.1" autocomplete="off" />
          </label>

          <label class="field">
            <span>端口</span>
            <input id="portInput" type="number" value="43770" min="1025" max="65535" />
          </label>

          <label class="field">
            <span>连接密码</span>
            <input id="passwordInput" type="password" value="demo-password" autocomplete="off" />
          </label>

          <label class="field">
            <span>模拟场景</span>
            <select id="mockScenarioSelect">
              <option value="normal" selected>正常连接</option>
              <option value="auth_failed">密码错误</option>
              <option value="screen_permission_denied">缺少屏幕录制权限</option>
              <option value="accessibility_permission_denied">缺少辅助功能权限</option>
              <option value="video_interrupted">视频流中断</option>
              <option value="disconnect_after_connect">连接后断开</option>
            </select>
          </label>

          <div class="button-row">
            <button id="connectButton" class="primary-action" type="button">
              <span aria-hidden="true">▶</span>
              连接
            </button>
            <button id="disconnectButton" class="secondary-action" type="button" disabled>
              <span aria-hidden="true">■</span>
              断开
            </button>
          </div>
        </section>

        <section class="panel device-panel" aria-labelledby="device-title">
          <div class="panel-heading">
            <h2 id="device-title">设备</h2>
            <button id="refreshDevicesButton" class="icon-button" type="button" title="刷新设备">
              ↻
            </button>
          </div>
          <button class="device-row active" type="button" data-host="127.0.0.1">
            <span class="device-dot"></span>
            <span>
              <strong>本机假 Mac</strong>
              <small>127.0.0.1</small>
            </span>
          </button>
          <button class="device-row" type="button" data-host="192.168.1.23">
            <span class="device-dot"></span>
            <span>
              <strong>Mac mini</strong>
              <small>192.168.1.23</small>
            </span>
          </button>
          <button class="device-row" type="button" data-host="192.168.1.42">
            <span class="device-dot muted"></span>
            <span>
              <strong>测试 Mac</strong>
              <small>192.168.1.42</small>
            </span>
          </button>

          <div class="history-block">
            <div class="history-title">最近连接</div>
            <div id="historyList" class="history-list"></div>
          </div>
        </section>

        <section class="panel event-panel" aria-labelledby="event-title">
          <div class="panel-heading">
            <h2 id="event-title">事件</h2>
            <button id="clearLogButton" class="icon-button" type="button" title="清空日志">⌫</button>
          </div>
          <ol id="eventLog" class="event-log" aria-live="polite"></ol>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="toolbar-group" role="group" aria-label="显示模式">
            <button id="windowModeButton" class="tool-button active" type="button" title="窗口模式">
              ◱
            </button>
            <button id="fullscreenButton" class="tool-button" type="button" title="全屏">
              ⛶
            </button>
          </div>

          <label class="select-control">
            <span>分辨率</span>
            <select id="resolutionSelect">
              <option value="native">原生</option>
              <option value="1280x720">1280 × 720</option>
              <option value="1600x900">1600 × 900</option>
              <option value="1920x1080" selected>1920 × 1080</option>
              <option value="2560x1440">2560 × 1440</option>
              <option value="3840x2160">3840 × 2160</option>
            </select>
          </label>

          <label class="select-control">
            <span>刷新率</span>
            <select id="fpsSelect">
              <option value="15">15 FPS</option>
              <option value="30">30 FPS</option>
              <option value="45">45 FPS</option>
              <option value="60" selected>60 FPS</option>
              <option value="90">90 FPS</option>
              <option value="120">120 FPS</option>
              <option value="144">144 FPS</option>
            </select>
          </label>

          <label class="select-control">
            <span>带宽</span>
            <select id="bandwidthSelect">
              <option value="5">5 Mbps</option>
              <option value="10">10 Mbps</option>
              <option value="20">20 Mbps</option>
              <option value="50" selected>50 Mbps</option>
              <option value="80">80 Mbps</option>
              <option value="120">120 Mbps</option>
              <option value="200">200 Mbps</option>
            </select>
          </label>

          <label class="toggle-control">
            <input id="audioToggle" type="checkbox" checked />
            <span>声音</span>
          </label>

          <label class="toggle-control">
            <input id="clipboardToggle" type="checkbox" checked />
            <span>剪贴板</span>
          </label>

          <button id="reverseButton" class="secondary-action compact" type="button" disabled>
            <span aria-hidden="true">⇄</span>
            反控
          </button>
        </header>

        <section class="remote-surface" aria-label="远程画面">
          <div id="remoteCanvas" class="remote-canvas" tabindex="0">
            <div class="mock-desktop">
              <img id="remoteFrameImage" class="remote-frame-image" alt="远程视频帧" />
              <div class="mac-menubar">
                <span>Mac mini</span>
                <span id="clockText">--:--</span>
              </div>
              <div class="mock-window">
                <div class="mock-titlebar">
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
                <div class="mock-content">
                  <h2>等待局域网连接</h2>
                  <p id="remoteStatusText">输入目标 IP 后开始连接。</p>
                  <div class="metrics-grid">
                    <div>
                      <strong id="metricResolution">1920 × 1080</strong>
                      <span>分辨率</span>
                    </div>
                    <div>
                      <strong id="metricFps">60 FPS</strong>
                      <span>刷新率</span>
                    </div>
                    <div>
                      <strong id="metricBandwidth">50 Mbps</strong>
                      <span>带宽</span>
                    </div>
                    <div>
                      <strong id="metricLatency">-- ms</strong>
                      <span>延迟</span>
                    </div>
                  </div>
                </div>
              </div>
              <div id="cursorDot" class="cursor-dot"></div>
            </div>
          </div>
        </section>

        <footer class="statusbar">
          <span id="statusText">未连接</span>
          <span id="inputText">输入事件：0</span>
          <span id="clipboardText">剪贴板：待机</span>
        </footer>
      </main>
    </div>

    <script src="./protocol-client.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
